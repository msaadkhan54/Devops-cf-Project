apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoppingassistantservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shoppingassistantservice
  template:
    metadata:
      labels:
        app: shoppingassistantservice
    spec:
      containers:
      - name: shoppingassistantservice
        image: muhammadsaadkhan5/google-web:shoppingassistant
        imagePullPolicy: Always

        env:
        - name: PORT
          value: "8080"

        - name: DISABLE_PROFILER
          value: "1"

        - name: ENABLE_TRACING
          value: "0"

        ports:
        - containerPort: 8080
