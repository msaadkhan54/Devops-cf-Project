AWSTemplateFormatVersion: '2010-09-09'
Description: Phase 5 - Application Load Balancer

Parameters:
  NetworkStackName:
    Type: String
    Description: Name of the Network Stack

  SecurityStackName:
    Type: String
    Description: Name of the Security Stack

  LoadBalancerName:
    Type: String
    Default: My-ALB
    Description: Name of the Application Load Balancer

  TargetGroupName:
    Type: String
    Default: My-TargetGroup
    Description: Name of the Target Group

Resources:

#############################################
# Application Load Balancer
#############################################

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Ref LoadBalancerName
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      
      LoadBalancerAttributes:
        - Key: deletion_protection.enabled
          Value: false

      SecurityGroups:
        - Fn::ImportValue:
            Fn::Sub: "${SecurityStackName}-ALBSecurityGroupId"

      Subnets:
        - Fn::ImportValue:
            Fn::Sub: "${NetworkStackName}-PublicSubnet1Id"

        - Fn::ImportValue:
            Fn::Sub: "${NetworkStackName}-PublicSubnet2Id"

      Tags:
        - Key: Name
          Value: !Ref LoadBalancerName

#############################################
# Target Group
#############################################

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Ref TargetGroupName
      Port: 80
      Protocol: HTTP
      TargetType: instance
      VpcId:
        Fn::ImportValue:
          Fn::Sub: "${NetworkStackName}-VPCId"

      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port

      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2

      Matcher:
        HttpCode: "200"

      Tags:
        - Key: Name
          Value: !Ref TargetGroupName

#############################################
# HTTP Listener
#############################################

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

Outputs:

  LoadBalancerArn:
    Description: Application Load Balancer ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub "${AWS::StackName}-ALBArn"

  LoadBalancerDNS:
    Description: DNS Name of the ALB
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-ALBDNSName"

  TargetGroupArn:
    Description: Target Group ARN
    Value: !Ref TargetGroup
    Export:
      Name: !Sub "${AWS::StackName}-TargetGroupArn"

  ListenerArn:
    Description: HTTP Listener ARN
    Value: !Ref HTTPListener
    Export:
      Name: !Sub "${AWS::StackName}-HTTPListenerArn"